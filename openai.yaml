openapi: "3.0.3"
info:
  title: "Searibu Marine Information API"
  description: |
    REST API untuk sistem informasi cuaca laut dan pasang surut Kepulauan Seribu.
    
    ## Standar yang Dipatuhi
    - **IHO S-100** Ed.5.2.0 — Universal Hydrographic Data Model
    - **IHO S-104** Ed.2.0.0 — Water Level Information for Surface Navigation
    
    ## Data Sources
    - **TPXO9-atlas-v5** (Oregon State University) — prediksi pasut harmonik
    - **Luwes Telemetri** (Pushidrosal) — observasi real-time stasiun pasut
    - **Open-Meteo API** — prakiraan cuaca dan gelombang
    
  version: "2.1.0"
  contact:
    name: "Searibu Team — ITB Geodesy & Geomatics Engineering"
    url: "https://searibu.vercel.app"
  license:
    name: "Academic Use"

servers:
  - url: "https://tpxo-luwes-api.onrender.com"
    description: "Production server"
  - url: "http://localhost:5000"
    description: "Local development"

tags:
  - name: tide
    description: Prediksi pasang surut berbasis model harmonik TPXO9
  - name: s104
    description: "Ekspor data IHO S-104 Ed.2.0.0 (Water Level — HDF5)"
  - name: luwes
    description: Observasi water level dari stasiun telemetri Luwes
  - name: system
    description: Health check dan informasi sistem

paths:
  /api/health:
    get:
      tags: [system]
      summary: Health check
      responses:
        "200":
          description: API berjalan normal
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:        { type: string, example: healthy }
                  grid_points:   { type: integer, example: 128 }
                  harmonic_constants: { type: integer, example: 1920 }

  /api/tide/prediction:
    get:
      tags: [tide]
      summary: Prediksi pasut TPXO9 untuk lokasi dan periode tertentu
      description: |
        Menghitung prediksi pasang surut menggunakan model harmonik TPXO9-atlas-v5
        dengan 15 konstituen. Menggunakan metode Schureman (1958) dan Foreman (1977).
        
        Output datum vertikal: **MSL (Mean Sea Level)** — sesuai S-104 §8.4
      parameters:
        - name: lon
          in: query
          required: true
          schema: { type: number, example: 106.58 }
          description: Longitude WGS84 (EPSG:4326)
        - name: lat
          in: query
          required: true
          schema: { type: number, example: -5.60 }
          description: Latitude WGS84 (EPSG:4326)
        - name: start_date
          in: query
          schema: { type: string, format: date, example: "2026-03-18" }
          description: Tanggal mulai (default hari ini)
        - name: end_date
          in: query
          schema: { type: string, format: date, example: "2026-03-25" }
          description: Tanggal akhir (default 7 hari dari start)
        - name: interval_hours
          in: query
          schema: { type: integer, enum: [1, 3, 6], default: 1 }
      responses:
        "200":
          description: Prediksi pasut berhasil
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TidePredictionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/s104/export:
    get:
      tags: [s104]
      summary: "Unduh file IHO S-104 Ed.2.0.0 HDF5 (TPXO — astronomicalPrediction)"
      description: |
        Menghasilkan file HDF5 yang sesuai dengan IHO S-104 Edition 2.0.0
        untuk data prediksi pasut TPXO9.
        
        **dataDynamicity = 1** (astronomicalPrediction) sesuai S-104 §8.7.1
        
        Struktur file HDF5:
        ```
        /  (root S-100 attributes)
        /Group_F/featureCode, WaterLevel
        /WaterLevel/ (dataDynamicity=1)
          /WaterLevel.01/
            /Group_001/values, dateTime
            /positioning/geometryValues
        ```
      parameters:
        - name: lon
          in: query
          required: true
          schema: { type: number, example: 106.58 }
        - name: lat
          in: query
          required: true
          schema: { type: number, example: -5.60 }
        - name: date
          in: query
          schema: { type: string, format: date, example: "2026-03-18" }
      responses:
        "200":
          description: File HDF5 S-104
          content:
            application/x-hdf:
              schema:
                type: string
                format: binary
          headers:
            Content-Disposition:
              schema:
                type: string
                example: 'attachment; filename="searibu_s104_tpxo_2026-03-18.h5"'
        "400":
          $ref: "#/components/responses/BadRequest"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/s104/export/luwes:
    get:
      tags: [s104]
      summary: "Unduh file IHO S-104 Ed.2.0.0 HDF5 (Luwes — observed)"
      description: |
        Menghasilkan file HDF5 S-104 untuk data observasi nyata dari stasiun
        telemetri Luwes (Pushidrosal).
        
        **dataDynamicity = 3** (observed) sesuai S-104 §8.7.1
        
        Koreksi Transfer of Level (TOL = **-2.156 m**) diterapkan untuk
        menyelaraskan pembacaan stasiun Luwes ke datum MSL TPXO9.
      parameters:
        - name: date
          in: query
          schema: { type: string, format: date, example: "2026-03-18" }
        - name: apply_tol
          in: query
          schema: { type: boolean, default: true }
          description: Terapkan koreksi Transfer of Level (-2.156 m)
      responses:
        "200":
          description: File HDF5 S-104 Luwes
          content:
            application/x-hdf:
              schema: { type: string, format: binary }
        "404":
          description: Tidak ada data observasi untuk tanggal yang diminta

  /api/s104/json:
    get:
      tags: [s104]
      summary: Preview metadata S-104 dalam format JSON
      description: Versi JSON dari data S-104 untuk konsumsi frontend React
      parameters:
        - name: lon
          in: query
          required: true
          schema: { type: number }
        - name: lat
          in: query
          required: true
          schema: { type: number }
        - name: date
          in: query
          schema: { type: string, format: date }
      responses:
        "200":
          description: Metadata S-104 + data water level dalam JSON
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/S104JsonResponse"

  /api/s104/metadata:
    get:
      tags: [s104]
      summary: Informasi compliance S-100/S-104 sistem Searibu
      responses:
        "200":
          description: Metadata compliance lengkap
          content:
            application/json:
              schema:
                type: object

  /api/s104/validate:
    get:
      tags: [s104]
      summary: Validasi file HDF5 S-104
      parameters:
        - name: path
          in: query
          required: true
          schema: { type: string }
          description: Path absolut ke file .h5
      responses:
        "200":
          description: File valid
        "422":
          description: File tidak valid — daftar error dikembalikan

  /api/luwes/level:
    get:
      tags: [luwes]
      summary: Data water level terbaru dari stasiun Luwes
      responses:
        "200":
          description: Observasi terbaru
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LuwesObservation"

  /api/luwes/history:
    get:
      tags: [luwes]
      summary: History water level dalam rentang tanggal
      parameters:
        - name: start
          in: query
          schema: { type: string, format: date }
        - name: end
          in: query
          schema: { type: string, format: date }
        - name: imei
          in: query
          schema: { type: string }
      responses:
        "200":
          description: History observasi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LuwesHistory"

  /api/luwes/overlay:
    get:
      tags: [luwes]
      summary: Overlay Luwes RAW + prediksi TPXO untuk satu hari
      parameters:
        - name: lon
          in: query
          required: true
          schema: { type: number }
        - name: lat
          in: query
          required: true
          schema: { type: number }
        - name: date
          in: query
          schema: { type: string, format: date }
      responses:
        "200":
          description: Data gabungan Luwes + TPXO

components:
  schemas:
    TidePredictionResponse:
      type: object
      properties:
        request:
          type: object
          properties:
            lon:           { type: number }
            lat:           { type: number }
            start_time:    { type: string, format: date-time }
            end_time:      { type: string, format: date-time }
            interval_hours:{ type: integer }
        grid:
          type: object
          properties:
            id:          { type: integer }
            lon:         { type: number }
            lat:         { type: number }
            distance_km: { type: number }
        predictions:
          type: array
          items:
            type: object
            properties:
              time:   { type: string, format: date-time }
              height: { type: number, description: "Water level in metres above MSL" }
        statistics:
          type: object
          properties:
            max:   { type: number }
            min:   { type: number }
            mean:  { type: number }
            range: { type: number }
        metadata:
          type: object
          properties:
            model:         { type: string, example: "TPXO9-atlas-v5" }
            datum:         { type: string, example: "MSL (Mean Sea Level)" }
            timezone:      { type: string, example: "UTC" }
            constituents:  { type: array, items: { type: string } }

    S104JsonResponse:
      type: object
      properties:
        s100_compliance:
          type: object
          properties:
            productSpecification: { type: string, example: "INT.IHO.S-104.2.0" }
            edition:              { type: string, example: "2.0.0" }
            horizontalCRS:        { type: integer, example: 4326 }
            verticalDatum:        { type: integer, example: 12 }
            dataDynamicity:       { type: integer, example: 1 }
            dataDynamicityLabel:  { type: string, example: "astronomicalPrediction" }
        waterLevelFeatures:
          type: array
          items:
            type: object
            properties:
              DateTime:         { type: string }
              waterLevelHeight: { type: number }
              waterLevelTrend:  { type: string, enum: [increasing, steady, decreasing] }

    LuwesObservation:
      type: object
      properties:
        rec:          { type: integer }
        station_name: { type: string }
        imei:         { type: string }
        level_m:      { type: number }
        recorded_at:  { type: string, format: date-time }

    LuwesHistory:
      type: object
      properties:
        imei:          { type: string }
        query_start:   { type: string }
        query_end:     { type: string }
        total_records: { type: integer }
        statistics:
          type: object
          properties:
            max_m:    { type: number }
            min_m:    { type: number }
            mean_m:   { type: number }
            latest_m: { type: number }
        data:
          type: array
          items:
            $ref: "#/components/schemas/LuwesObservation"

  responses:
    BadRequest:
      description: Parameter tidak valid
      content:
        application/json:
          schema:
            type: object
            properties:
              error: { type: string }
    ServiceUnavailable:
      description: Layanan tidak tersedia
      content:
        application/json:
          schema:
            type: object
            properties:
              error: { type: string }