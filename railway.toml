[build]
builder = "nixpacks"
buildCommand = "pip install -r requirements.txt"

[deploy]
startCommand = "gunicorn api.app:app --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 120"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
