services:
  - type: web
    name: tpxo-luwes-api
    runtime: python
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn api.app:app --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 120
    plan: free

    # Persistent disk untuk SQLite — WAJIB agar data tidak hilang setiap deploy
    disk:
      name: luwes-data
      mountPath: /data
      sizeGB: 1

    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "False"
      - key: LUWES_DB_PATH
        value: /data/luwes_raw.db
      - key: DATABASE_PATH
        value: /data/tpxo_seribu.db
      - key: CORS_ORIGINS
        value: https://searibu.vercel.app  # ← ganti dengan URL Vercel Anda